<script>
    // =======================================================================
    // FrontTemplate-Card-1 (Drawing Card)
    //
    // Persistence: in-memory (_ks) → cookie → localStorage fallback chain
    // Settings:    shared modal with c1/c2 tabs, scoped storage per card type
    // Grid:        SVG paths built as HTML string, single DOM write
    // Drawing:     pointer/touch → SVG path, clamped to pad bounds
    // Algo:        smoothing → resample to 65pts → composite score:
    //              Fréchet 40% | avg-dist 25% | start 17.5% | end 17.5%
    //              hard gates: length ratio, 4-sector direction, 1.4× ceiling
    //              strictness: loose ×1.35 | normal ×1.0 | strict ×0.7
    // Celebration: WAAPI animations (glow, bounce, shine, sparkles)
    // Auto-flip:   pycmd / showAnswer / answer-fallback div
    // Platforms:   Anki Desktop, AnkiDroid, AnkiMobile (WKWebView)
    // =======================================================================

    // --- Anti-Flicker ---
    // Remove back-side CSS injection when we're on the front side
    if (!document.getElementById('is-back-side-marker')) {
        var _af = document.getElementById('kanji-anti-flicker');
        if (_af) _af.remove();
    }

    document.body.classList.add('no-scroll');

    // --- Persistence Layer ---

    var _cookieCache = null, _cookieCacheRaw = null;
    function _parseCookies() {
        var raw = document.cookie;
        if (raw === _cookieCacheRaw) return _cookieCache;
        _cookieCacheRaw = raw;

            const out = [pts[0]];
            for (let i = 1; i < pts.length - 1; i++) {
                out.push({ x: (pts[i - 1].x + pts[i].x + pts[i + 1].x) / 3, y: (pts[i - 1].y + pts[i].y + pts[i + 1].y) / 3 });
            }
            out.push(pts[pts.length - 1]);
            return out;
        };

        const evaluateStroke = () => {
            if (userPoints.length === 0) { clearDrawLayer(); return; }

            // Minimum travel distance: filter accidental taps
            let totalTravel = 0;
            for (let i = 1; i < userPoints.length; i++) {
                totalTravel += Math.hypot(userPoints[i].x - userPoints[i - 1].x, userPoints[i].y - userPoints[i - 1].y);
            }
            if (totalTravel < 4) { clearDrawLayer(); return; }

            // Read stroke strictness setting
            const strictness = hostGet('kanjiOptStrictness', cachedGlobalConf.strictness || 'normal');
            const mult = strictness === 'loose' ? 1.35 : strictness === 'strict' ? 0.7 : 1.0;

            // Sample the ideal stroke path
            const idealPath = paths[currentStroke];
            const idealLength = idealPath.getTotalLength() || 1;
            const idealPoints = [];
            for (let i = 0; i <= SAMPLE_POINTS; i++) {
                const pt = idealPath.getPointAtLength((i / SAMPLE_POINTS) * idealLength);
                idealPoints.push({ x: pt.x, y: pt.y });
            }

            // Smooth user input to reduce touch jitter, then resample
            const userSmoothed = smoothInput(userPoints);
            const userResampled = resamplePoints(userSmoothed, SAMPLE_POINTS + 1);

            // Length-relative tolerances: short strokes stricter, long strokes more forgiving
            const lenFactor = Math.max(0.7, Math.min(1.4, idealLength / 45));
            const tolStartEnd = 15 * mult * lenFactor;
            const tolShape = 17 * mult * lenFactor;
            const tolAvg = tolShape * 0.6;

            // --- Hard gates (instant rejection) ---

            // Stroke length ratio
            const lenRatioMin = strictness === 'strict' ? 0.50 : 0.40;
            const lenRatioMax = strictness === 'strict' ? 2.00 : 2.50;
            const lengthRatio = totalTravel / idealLength;
            const lengthOk = lengthRatio >= lenRatioMin && lengthRatio <= lenRatioMax;

            // Direction consistency: 4 sectors must match within angular tolerance
            const NSEC = 4;
            const idealAng = segmentAngles(idealPoints, NSEC);
            const userAng = segmentAngles(userResampled, NSEC);
            const angMult = strictness === 'loose' ? 1.15 : strictness === 'strict' ? 0.85 : 1.0;
            const tolAngle = (Math.PI * 0.47) * angMult;
            let directionOk = true;
            const secStep = SAMPLE_POINTS / NSEC;
            for (let s = 0; s < NSEC; s++) {
                const si = Math.round(s * secStep), ei = Math.round((s + 1) * secStep);
                if (Math.hypot(idealPoints[ei].x - idealPoints[si].x, idealPoints[ei].y - idealPoints[si].y) < 3) continue;
                let ad = Math.abs(idealAng[s] - userAng[s]);
                if (ad > Math.PI) ad = 2 * Math.PI - ad;
                if (ad > tolAngle) { directionOk = false; break; }
            }

            // --- Metrics ---

            const startDist = Math.hypot(userResampled[0].x - idealPoints[0].x, userResampled[0].y - idealPoints[0].y);
            const endDist = Math.hypot(userResampled[userResampled.length - 1].x - idealPoints[SAMPLE_POINTS].x, userResampled[userResampled.length - 1].y - idealPoints[SAMPLE_POINTS].y);
            const shapeError = discreteFrechet(idealPoints, userResampled);
            const avgError = avgPointDist(idealPoints, userResampled);

            // Normalized scores (0 = perfect, 1 = at individual threshold)
            const sStart = startDist / tolStartEnd;
            const sEnd = endDist / tolStartEnd;
            const sShape = shapeError / tolShape;
            const sAvg = avgError / tolAvg;

            // Hard ceiling: no single metric may exceed 1.4x its threshold
            const ceilingOk = sStart <= 1.4 && sEnd <= 1.4 && sShape <= 1.4 && sAvg <= 1.6;

            // Weighted composite: slight exceed in one area compensated by others
            const composite = sStart * 0.175 + sEnd * 0.175 + sShape * 0.4 + sAvg * 0.25;

            if (lengthOk && directionOk && ceilingOk && composite <= 1.0) {
                mistakes = 0; paths[currentStroke].classList.remove('hint-active'); paths[currentStroke].classList.add('stroke-complete');
                currentStroke++; saveState(); clearDrawLayer();
                if (currentStroke >= paths.length) { if (actionButtons) actionButtons.style.display = 'none'; playCompletionAnimation().then(() => triggerAutoFlip()); }
            } else {
                mistakes++;
                if (mistakes > problemStrokes[currentStroke]) { problemStrokes[currentStroke] = mistakes; saveState(); }

                const isAutoDrawOn = hostGet('kanjiOptAutodraw', cachedGlobalConf.autodraw) === 'on';
                const isColorFeedbackFrontOn = hostGet('kanjiOptColorFront', cachedGlobalConf.colorFront) === 'on';

                if (mistakes >= 3 && isAutoDrawOn) {
                    const p = paths[currentStroke];
                    p.classList.remove('hint-active');
                    void p.offsetWidth; // Force Reflow
                    p.classList.add('hint-active');
                }

                if (isColorFeedbackFrontOn) {
                    const colorVar = mistakes === 1 ? "var(--stroke-warn1)" : mistakes === 2 ? "var(--stroke-warn2)" : "var(--stroke-err)";
                    if (currentSVGPath) currentSVGPath.style.setProperty("stroke", colorVar);
                }

                clearTimeout(errorTimeout); clearTimeout(fadeTimeout); drawLayer.classList.remove('fade-out');
                errorTimeout = setTimeout(() => {
                    if (!isDrawing) {
                        drawLayer.classList.add('fade-out');
                        fadeTimeout = setTimeout(() => { if (!isDrawing) { clearDrawLayer(); drawLayer.classList.remove('fade-out'); } }, 200);
                    }
                }, 250);
            }
            userPoints = [];
        };

        const stopDrawing = (e) => {
            if (!isDrawing) return;
            if (e && e.pointerId) { try { drawLayer.releasePointerCapture(e.pointerId); } catch (err) { } }
            if (e && e.cancelable !== false) { e.preventDefault(); e.stopPropagation(); }
            isDrawing = false; evaluateStroke();
        };

        const kanjiContainer = document.querySelector('.kanji-container');
        if (kanjiContainer) {
            const blockAppGestures = (e) => {
                if (e.target.closest('.settings-overlay') || e.target.closest('.gear-btn')) return;
                e.stopPropagation(); if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            };
            ['touchstart', 'touchmove', 'touchend'].forEach(evt => { kanjiContainer.addEventListener(evt, blockAppGestures, { passive: false }); });
        }

        if (window.kanjiStopDrawingHandler) {
            document.removeEventListener('pointerup', window.kanjiStopDrawingHandler);
            document.removeEventListener('pointercancel', window.kanjiStopDrawingHandler);
            document.removeEventListener('mouseup', window.kanjiStopDrawingHandler);
            document.removeEventListener('touchend', window.kanjiStopDrawingHandler);
            document.removeEventListener('touchcancel', window.kanjiStopDrawingHandler);
        }
        window.kanjiStopDrawingHandler = stopDrawing;

        if (window.PointerEvent) {
            drawLayer.addEventListener('pointerdown', startDrawing); drawLayer.addEventListener('pointermove', draw);
            drawLayer.addEventListener('pointerleave', (e) => { if (isDrawing) stopDrawing(e); });
            document.addEventListener('pointerup', window.kanjiStopDrawingHandler); document.addEventListener('pointercancel', window.kanjiStopDrawingHandler);
            ['touchstart', 'touchmove', 'touchend'].forEach(evt => { drawLayer.addEventListener(evt, (e) => { if (e.cancelable) e.preventDefault(); }, { passive: false }); });
        } else {
            drawLayer.addEventListener('mousedown', startDrawing); drawLayer.addEventListener('mousemove', draw);
            drawLayer.addEventListener('touchstart', (e) => { if (e.cancelable) e.preventDefault(); startDrawing(e); }, { passive: false });
            drawLayer.addEventListener('touchmove', (e) => { if (e.cancelable) e.preventDefault(); draw(e); }, { passive: false });
            document.addEventListener('mouseup', window.kanjiStopDrawingHandler); document.addEventListener('touchend', window.kanjiStopDrawingHandler); document.addEventListener('touchcancel', window.kanjiStopDrawingHandler);
        }

        var _revealFn = () => { document.getElementById('svg-guide').classList.toggle('is-visible'); };
        document.getElementById('button-reveal').addEventListener('click', _revealFn);
        document.getElementById('button-reveal')._kanjiAction = _revealFn;
        var _resetFn = () => {
            currentStroke = 0; mistakes = 0; userPoints = []; problemStrokes.fill(0); saveState();
            skipTimeouts.forEach(clearTimeout); skipTimeouts = [];
            const preColors = [];
            for (let i = 0; i < paths.length; i++) preColors.push(getComputedStyle(paths[i]).stroke);
            paths.forEach((p, i) => {
                if (p.classList.contains('stroke-complete') || p.classList.contains('animate-draw') || p.classList.contains('hint-active')) {
                    p.style.setProperty('stroke', preColors[i], 'important');
                    p.classList.remove('stroke-complete', 'hint-active', 'animate-draw');
                    p.classList.add('rewind-anim');
                    setTimeout(() => {
                        p.classList.remove('rewind-anim');
                        p.style.removeProperty('stroke');
                    }, ANIMATION_DURATION_MS);
                } else {
                    p.classList.remove('stroke-complete', 'hint-active', 'animate-draw', 'rewind-anim');
                    p.style.removeProperty('stroke');
                }
            });
            clearTimeout(errorTimeout); clearTimeout(fadeTimeout); drawLayer.classList.remove('fade-out'); clearDrawLayer();
            document.getElementById('svg-guide').classList.remove('is-visible');
            if (actionButtons) actionButtons.style.display = 'flex';
            const fakeBack = document.getElementById("answer-fallback"); if (fakeBack) fakeBack.style.display = "none";
        };
        document.getElementById('button-reset').addEventListener('click', _resetFn);
        document.getElementById('button-reset')._kanjiAction = _resetFn;
        var _skipFn = () => {
            if (currentStroke >= paths.length) return;
            const pathToAnimate = paths[currentStroke]; problemStrokes[currentStroke] = 3;
            pathToAnimate.classList.remove('hint-active', 'rewind-anim'); pathToAnimate.classList.add('animate-draw');
            const animTimer = setTimeout(() => { pathToAnimate.classList.remove('animate-draw'); pathToAnimate.classList.add('stroke-complete'); }, ANIMATION_DURATION_MS);
            skipTimeouts.push(animTimer); currentStroke++; saveState(); mistakes = 0;
            clearTimeout(errorTimeout); clearTimeout(fadeTimeout); drawLayer.classList.add('fade-out');
            fadeTimeout = setTimeout(() => { clearDrawLayer(); drawLayer.classList.remove('fade-out'); }, 300);
            if (currentStroke >= paths.length) {
                if (actionButtons) actionButtons.style.display = 'none';
                const flipTimer = setTimeout(() => { playCompletionAnimation().then(() => triggerAutoFlip()); }, ANIMATION_DURATION_MS); skipTimeouts.push(flipTimer);
            }
        };
        document.getElementById('button-skip').addEventListener('click', _skipFn);
        document.getElementById('button-skip')._kanjiAction = _skipFn;
    })();

    // --- Button Feedback & Stylus Fixes ---

    // Click-flash feedback for action buttons
    (function () {
        var ab = document.querySelector('.action-buttons');
        if (!ab) return;
        ab.addEventListener('click', function (e) {
            var btn = e.target.closest('button');
            if (!btn) return;
            btn.classList.remove('btn-flash');
            void btn.offsetWidth;
            btn.classList.add('btn-flash');
            if (navigator.vibrate) navigator.vibrate(10);
        });
    })();

    // Stylus fix: Apple Pencil / S-Pen don't reliably fire onclick
    (function () {
        var lastGearOpen = 0;
        function addPenHandler(el, handler) {
            if (!el || el._ankiPenFixed) return;
            el._ankiPenFixed = true;
            el.addEventListener('pointerup', function (e) {
                if (e.pointerType !== 'pen') return;
                var now = Date.now();
                if (handler === 'gear' && now - lastGearOpen < 400) return;
                if (handler === 'gear') lastGearOpen = now;
                e.preventDefault(); e.stopPropagation();
                var eatClick = function (ev) { ev.stopPropagation(); ev.stopImmediatePropagation(); ev.preventDefault(); document.removeEventListener('click', eatClick, true); };
                document.addEventListener('click', eatClick, true);
                setTimeout(function () { document.removeEventListener('click', eatClick, true); }, 500);
                if (handler === 'gear') {
                    openSettings(e);
                } else {
                    // Trigger visual + haptic feedback manually
                    el.classList.remove('btn-flash'); void el.offsetWidth; el.classList.add('btn-flash');
                    if (navigator.vibrate) navigator.vibrate(10);
                    if (el._kanjiAction) el._kanjiAction();
                }
            });
        }
        addPenHandler(document.querySelector('.gear-btn'), 'gear');
        addPenHandler(document.getElementById('button-reveal'), 'btn');
        addPenHandler(document.getElementById('button-skip'), 'btn');
        addPenHandler(document.getElementById('button-reset'), 'btn');
    })();

    // --- Scroll Guards ---

    // Register modal scroll guards synchronously to prevent flicker
    document.querySelectorAll('.settings-modal, .info-modal').forEach(modal => { if (modal._kanjiScrollGuarded) return; modal._kanjiScrollGuarded = true; modal.addEventListener('touchmove', function (e) { if (this.scrollHeight <= this.clientHeight) e.preventDefault(); }, { passive: false }); });
    document.querySelectorAll('.settings-overlay, .info-overlay').forEach(overlay => { if (overlay._kanjiScrollGuarded) return; overlay._kanjiScrollGuarded = true; overlay.addEventListener('touchmove', function (e) { if (e.target === this) e.preventDefault(); }, { passive: false }); });
</script>
