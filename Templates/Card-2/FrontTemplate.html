<script>
    // =======================================================================
    // FrontTemplate-Card-2 (Recognition Card)
    //
    // All strokes pre-revealed on load (no drawing interaction)
    // Settings modal shared with Card 1 (scoped to c2)
    // Persistence + grid rendering identical to Card 1
    // =======================================================================

    // --- AnkiWeb / Browser Detection ---
    if (location.protocol === 'https:' && typeof pycmd === 'undefined' && typeof AnkiDroidJS === 'undefined') {
        document.documentElement.classList.add('is-ankiweb');
        var _awH = window.innerHeight;
        var _awSize = Math.min(_awH - 390, 550, document.documentElement.clientWidth * 0.9);
        if (_awSize < 200) _awSize = 200;
        var _awPx = _awSize + 'px';
        document.documentElement.style.setProperty('--ankiweb-modal-max-h', (_awH - 200) + 'px');
        document.documentElement.style.setProperty('--dynamic-size', _awPx);
        var _kc = document.querySelector('.kanji-container');
        if (_kc) { _kc.style.width = _awPx; _kc.style.height = _awPx; }
        var _ab = document.querySelector('.action-buttons');
        if (_ab) _ab.style.width = _awPx;
        var _ib = document.querySelector('.info-btn');
        if (_ib) _ib.style.width = _awPx;
    }

    // --- Anti-Flicker ---
    // Remove back-side CSS injection when we're on the front side
    if (!document.getElementById('is-back-side-marker')) {
        var _af = document.getElementById('kanji-anti-flicker');
        if (_af) _af.remove();
    }

    document.body.classList.add('no-scroll');

    // Reset previous card's error data (Card 2 has no drawing,
    // so stale stroke errors from Card 1 must not carry over)
    (function () {
        var empty = JSON.stringify(new Array(document.querySelectorAll('#svg-bg path').length).fill(0));
        ['sessionStorage', 'localStorage'].forEach(function (s) {
            try { window[s].setItem('kanjiErrors', empty); window[s].setItem('kanjiCurrentStroke', '0'); } catch (e) { }
        });
        window._kanjiProblemStrokes = JSON.parse(empty);
        window._kanjiCurrentStroke = 0;
    })();

    // --- Persistence Layer ---

    var _cookieCache = null, _cookieCacheRaw = null;
    function _parseCookies() {
        var raw = document.cookie;
        if (raw === _cookieCacheRaw) return _cookieCache;
        _cookieCacheRaw = raw;
        _cookieCache = { _kObj: null, pairs: raw.split('; ') };
        if (location.protocol !== 'file:') {
            for (var i = 0; i < _cookieCache.pairs.length; i++) {
                if (_cookieCache.pairs[i].indexOf('_k=') === 0) { try { _cookieCache._kObj = JSON.parse(decodeURIComponent(_cookieCache.pairs[i].substring(3))); } catch (x) { } break; }
            }
        }
        return _cookieCache;
    }
